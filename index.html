<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Weather Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        🌤️ Async Weather Tracker
    </header>

    <div class="grid">
        <div class="card">
            <h2>Search City</h2>
            <form id="form" class="search-container">
                <input type="text" id="city" placeholder="Enter city name..." >
                <button type="submit">Search</button>
            </form>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h2 >Search History</h2>
                <button type="button" id="clearHistory" class="clear-btn">Clear History</button>
            </div>
            <div class="historyBtn">
            </div>
        </div>

        <div class="card">
            <h2>Weather Info</h2>
            <div id="weatherContent">
                <p style="color: #2b2b2b; border: none; font-style: italic;">Search for a city to see details</p>
            </div>
        </div>
    </div>

    <div class="console-card">
        <h2>Console &ndash; Event Loop</h2>
        <div id="consoleBox"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
